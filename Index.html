<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mausam — Live Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <div class="app">

    <header>
      <div class="brand">
        <div class="logo">MAU<span>SAM</span></div>
        <div class="tagline">● Live Weather · Real Time</div>
      </div>
      <button class="refresh-btn" id="refreshBtn">↻ &nbsp;Refresh</button>
    </header>

    <div class="cards-grid">

      <!-- My Location Card -->
      <div class="card card--user" id="card-user">
        <div class="card-loader" id="loader-user">
          <div class="spinner"></div>
          <p>Location dhundha ja raha hai…</p>
        </div>
        <div class="card-content hidden" id="content-user"></div>
      </div>

      <!-- Delhi Card -->
      <div class="card card--delhi" id="card-delhi">
        <div class="card-loader" id="loader-delhi">
          <div class="spinner spinner--orange"></div>
          <p>Delhi ka data load ho raha hai…</p>
        </div>
        <div class="card-content hidden" id="content-delhi"></div>
      </div>

    </div>

    <p class="updated-time" id="updated-time"></p>

  </div>
  <hr style="width: 80%; margin: 2px auto; border: none;height: 1px; background-color: #7fffd44d;">
  <footer>
      Created & Developed by<a href="#">&nbsp Ankit Vishwakarma</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
